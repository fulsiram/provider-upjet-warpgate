    warpgate_ticket:
        subCategory: ""
        description: Manages a ticket in Warpgate. Tickets provide pre-authenticated access to a target for a specific user.
        name: warpgate_ticket
        title: warpgate_ticket Resource - terraform-provider-warpgate
        examples:
            - name: ticket
              manifest: |-
                {
                  "target_name": "web-server",
                  "username": "admin"
                }
              dependencies:
                warpgate_target.web_server: |-
                    {
                      "description": "Web server target",
                      "http_options": [
                        {
                          "external_host": "web.example.com",
                          "tls": [
                            {
                              "mode": "Required",
                              "verify": true
                            }
                          ],
                          "url": "https://web.example.com"
                        }
                      ],
                      "name": "web-server"
                    }
        argumentDocs:
            description: (String) The description of the ticket.
            expiry: (String) The expiry time of the ticket.
            id: (String) The ID of this resource.
            number_of_uses: (Number) The number of uses allowed for the ticket before it becomes invalid.
            secret: (String, Sensitive) The secret value of the ticket used for authentication.
            target_name: (String) The name of the target the ticket grants access to.
            username: (String) The user associated with the ticket. Will determine the permissions and access rights.
        importStatements: []
    warpgate_user:
        subCategory: ""
        description: Manages a user in Warpgate.
        name: warpgate_user
        title: warpgate_user Resource - terraform-provider-warpgate
        examples:
            - name: eugene
              manifest: |-
                {
                  "credential_policy": [
                    {
                      "http": [
                        "Password",
                        "Totp"
                      ],
                      "mysql": [
                        "Password"
                      ],
                      "postgres": [
                        "Password"
                      ],
                      "ssh": [
                        "Password",
                        "PublicKey"
                      ]
                    }
                  ],
                  "description": "Eugene - Development Lead",
                  "username": "eugene"
                }
              dependencies:
                warpgate_user_sso_credential.github_sso: |-
                    {
                      "email": "john.doe@company.com",
                      "sso_provider": "github",
                      "user_id": "${warpgate_user.sso_user.id}"
                    }
                warpgate_user_sso_credential.google_sso: |-
                    {
                      "email": "john.doe@company.com",
                      "sso_provider": "google",
                      "user_id": "${warpgate_user.sso_user.id}"
                    }
            - name: deploy_bot
              manifest: |-
                {
                  "allowed_ip_ranges": [
                    "10.0.0.0/8",
                    "192.168.1.0/24"
                  ],
                  "credential_policy": [
                    {
                      "ssh": [
                        "PublicKey"
                      ]
                    }
                  ],
                  "description": "Deployment automation service account",
                  "username": "deploy_bot"
                }
              dependencies:
                warpgate_user_sso_credential.github_sso: |-
                    {
                      "email": "john.doe@company.com",
                      "sso_provider": "github",
                      "user_id": "${warpgate_user.sso_user.id}"
                    }
                warpgate_user_sso_credential.google_sso: |-
                    {
                      "email": "john.doe@company.com",
                      "sso_provider": "google",
                      "user_id": "${warpgate_user.sso_user.id}"
                    }
            - name: sso_user
              manifest: |-
                {
                  "credential_policy": [
                    {
                      "http": [
                        "Sso"
                      ],
                      "mysql": [
                        "Sso"
                      ],
                      "postgres": [
                        "Sso"
                      ],
                      "ssh": [
                        "Sso",
                        "PublicKey"
                      ]
                    }
                  ],
                  "description": "User with SSO authentication",
                  "username": "john.doe"
                }
              dependencies:
                warpgate_user_sso_credential.github_sso: |-
                    {
                      "email": "john.doe@company.com",
                      "sso_provider": "github",
                      "user_id": "${warpgate_user.sso_user.id}"
                    }
                warpgate_user_sso_credential.google_sso: |-
                    {
                      "email": "john.doe@company.com",
                      "sso_provider": "google",
                      "user_id": "${warpgate_user.sso_user.id}"
                    }
            - name: sso_user
              manifest: |-
                {
                  "credential_policy": [
                    {
                      "http": [
                        "Sso"
                      ],
                      "ssh": [
                        "Sso",
                        "PublicKey"
                      ]
                    }
                  ],
                  "description": "Alice - SSO authenticated user",
                  "username": "alice"
                }
