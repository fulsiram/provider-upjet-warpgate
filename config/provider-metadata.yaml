name: warp-tech/warpgate
resources:
    warpgate_parameters:
        subCategory: ""
        description: Manages global parameters in Warpgate. These settings control behavior across the entire Warpgate instance.
        name: warpgate_parameters
        title: warpgate_parameters Resource - terraform-provider-warpgate
        examples:
            - name: global_settings
              manifest: |-
                {
                  "allow_own_credential_management": true,
                  "minimize_password_login": false,
                  "rate_limit_bytes_per_second": 1000000,
                  "show_session_menu": true,
                  "ssh_client_auth_keyboard_interactive": false,
                  "ssh_client_auth_password": true,
                  "ssh_client_auth_publickey": true
                }
        argumentDocs:
            allow_own_credential_management: '- (Required) Allow users to manage their own credentials.'
            id: '- The ID of this resource (always set to "parameters").'
            minimize_password_login: '- (Optional) Minimize the use of password-based login methods.'
            rate_limit_bytes_per_second: '- (Optional) Rate limit for data transfer in bytes per second.'
            show_session_menu: '- (Optional, default: true) When enabled, Warpgate injects a session menu into HTTP sessions, allowing users to log out or return to the home page.'
            ssh_client_auth_keyboard_interactive: '- (Optional) Enable SSH keyboard interactive authentication for clients.'
            ssh_client_auth_password: '- (Optional) Enable SSH password authentication for clients.'
            ssh_client_auth_publickey: '- (Optional) Enable SSH public key authentication for clients.'
        importStatements: []
    warpgate_password_credential:
        subCategory: ""
        description: Manages a password credential for a user in Warpgate.
        name: warpgate_password_credential
        title: warpgate_password_credential Resource - terraform-provider-warpgate
        examples:
            - name: eugene_password
              manifest: |-
                {
                  "password": "securepassword123",
                  "user_id": "${warpgate_user.eugene.id}"
                }
              references:
                user_id: warpgate_user.eugene.id
              dependencies:
                warpgate_user.eugene: |-
                    {
                      "credential_policy": [
                        {
                          "http": [
                            "Password"
                          ],
                          "ssh": [
                            "Password",
                            "PublicKey"
                          ]
                        }
                      ],
                      "username": "eugene"
                    }
        argumentDocs:
            id: '- The combined ID in the format user_id:credential_id.'
            password: '- (Required) The password to use for authentication. This is a sensitive value and will be stored only in state. This cannot be changed after creation, requiring recreation of the resource to update the password.'
            user_id: '- (Required) The ID of the user to add the password credential to. This cannot be changed after creation.'
        importStatements: []
    warpgate_public_key_credential:
        subCategory: ""
        description: Manages a public key credential for a user in Warpgate.
        name: warpgate_public_key_credential
        title: warpgate_public_key_credential Resource - terraform-provider-warpgate
        examples:
            - name: devops_key
              manifest: |-
                {
                  "label": "Work Laptop",
                  "public_key": "ssh-rsa  email@example.com",
                  "user_id": "${warpgate_user.devops.id}"
                }
              references:
                user_id: warpgate_user.devops.id
              dependencies:
                warpgate_user.devops: |-
                    {
                      "credential_policy": [
                        {
                          "ssh": [
                            "PublicKey"
                          ]
                        }
                      ],
                      "username": "devops"
                    }
        argumentDocs:
            date_added: '- The date and time when the public key was added to the user''s account.'
            id: '- The combined ID in the format user_id:credential_id.'
            label: '- (Required) A descriptive label for the public key, helping to identify the key''s purpose or origin.'
            last_used: '- The date and time when the public key was last used for authentication, if available.'
            public_key: '- (Required) The OpenSSH format public key. This should be the public portion of an SSH keypair.'
            user_id: '- (Required) The ID of the user to add the public key credential to. This cannot be changed after creation.'
        importStatements: []
    warpgate_role:
        subCategory: ""
        description: Manages a role in Warpgate. Roles define permissions that can be assigned to users and targets.
        name: warpgate_role
        title: warpgate_role Resource - terraform-provider-warpgate
        examples:
            - name: developers
              manifest: |-
                {
                  "description": "Role for development team members",
                  "name": "developers"
                }
            - name: admins
              manifest: |-
                {
                  "description": "Role for system administrators with full access",
                  "name": "administrators"
                }
        argumentDocs:
            description: '- (Optional) A human-readable description of the role and its purpose.'
            id: '- The ID of the role.'
            name: '- (Required) The name of the role. Must be unique within the Warpgate instance.'
        importStatements: []
    warpgate_target:
        subCategory: ""
        description: Manages a target in Warpgate. A target represents a destination system that users can connect to.
        name: warpgate_target
        title: warpgate_target Resource - terraform-provider-warpgate
        examples:
            - name: web_server
              manifest: |-
                {
                  "description": "Production web server",
                  "name": "web-server",
                  "ssh_options": [
                    {
                      "host": "10.0.0.1",
                      "password_auth": [
                        {
                          "password": "supersecret"
                        }
                      ],
                      "port": 22,
                      "username": "admin"
                    }
                  ]
                }
            - name: api_server
              manifest: |-
                {
                  "description": "Internal API server",
                  "http_options": [
                    {
                      "external_host": "api.external.example.com",
                      "headers": {
                        "X-API-Version": "v1",
                        "X-Custom-Header": "custom-value"
                      },
                      "tls": [
                        {
                          "mode": "Required",
                          "verify": true
                        }
                      ],
                      "url": "https://api.internal.example.com"
                    }
                  ],
                  "name": "api-server"
                }
            - name: mysql_db
              manifest: |-
                {
                  "description": "Production MySQL database",
                  "mysql_options": [
                    {
                      "host": "db.example.com",
                      "password": "dbpassword",
                      "port": 3306,
                      "tls": [
                        {
                          "mode": "Required",
                          "verify": true
                        }
                      ],
                      "username": "app_user"
                    }
                  ],
                  "name": "mysql-db"
                }
            - name: postgres_db
              manifest: |-
                {
                  "description": "Analytics PostgreSQL database",
                  "name": "postgres-db",
                  "postgres_options": [
                    {
                      "host": "analytics-db.example.com",
                      "password": "dbpassword",
                      "port": 5432,
                      "tls": [
                        {
                          "mode": "Required",
                          "verify": true
                        }
                      ],
                      "username": "analyst"
                    }
                  ]
                }
            - name: k8s_cluster
              manifest: |-
                {
                  "description": "Production Kubernetes cluster",
                  "kubernetes_options": [
                    {
                      "cluster_url": "https://k8s.example.com:6443",
                      "tls": [
                        {
                          "mode": "Required",
                          "verify": true
                        }
                      ],
                      "token_auth": [
                        {
                          "token": "eyJhbGciOiJSUzI1NiIs..."
                        }
                      ]
                    }
                  ],
                  "name": "k8s-cluster"
                }
            - name: k8s_cluster_cert
              manifest: |-
                {
                  "description": "Kubernetes cluster with certificate auth",
                  "kubernetes_options": [
                    {
                      "certificate_auth": [
                        {
                          "certificate": "${file(\"client.crt\")}",
                          "private_key": "${file(\"client.key\")}"
                        }
                      ],
                      "cluster_url": "https://k8s.example.com:6443",
                      "tls": [
                        {
                          "mode": "Required",
                          "verify": true
                        }
                      ]
                    }
                  ],
                  "name": "k8s-cluster-cert"
                }
        argumentDocs:
            allow_insecure_algos: (Boolean) Allow insecure SSH algorithms
            allow_roles: '- The list of roles allowed to access this target (computed from role assignments).'
            certificate: (String) The client certificate PEM
            certificate_auth: '(Block List, Max: 1) Certificate authentication for Kubernetes (see below for nested schema)'
            cluster_url: (String) The Kubernetes cluster URL
            description: '- (Optional) A human-readable description of the target.'
            external_host: (String) External host for HTTP requests
            group_id: '- (Optional) The ID of the target group this target is assigned to.'
            headers: (Map of String) HTTP headers to include in requests
            host: (String) The MySQL server hostname or IP address
            http_options: '- (Optional) HTTP target configuration block.'
            http_options.external_host: '- (Optional) External host for HTTP requests.'
            http_options.headers: '- (Optional) HTTP headers to include in requests.'
            http_options.tls: '- (Required) TLS configuration block.'
            http_options.url: '- (Required) The HTTP server URL.'
            id: '- The ID of the target.'
            kubernetes_options: '(Block List, Max: 1) Kubernetes target options (see below for nested schema)'
            mode: '- (Required) TLS mode. Valid values: Disabled, Preferred, Required.'
            mysql_options: '- (Optional) MySQL target configuration block.'
            mysql_options.host: '- (Required) The MySQL server hostname or IP address.'
            mysql_options.password: '- (Optional) The MySQL password.'
            mysql_options.port: '- (Required) The MySQL server port.'
            mysql_options.tls: '- (Required) TLS configuration block.'
            mysql_options.username: '- (Required) The MySQL username.'
            name: '- (Required) The name of the target. Must be unique within the Warpgate instance.'
            password: '- (Required) The password for SSH authentication.'
            password_auth: '(Block List, Max: 1) Password authentication for SSH (see below for nested schema)'
            port: (Number) The MySQL server port
            postgres_options: '- (Optional) PostgreSQL target configuration block.'
            postgres_options.host: '- (Required) The PostgreSQL server hostname or IP address.'
            postgres_options.password: '- (Optional) The PostgreSQL password.'
            postgres_options.port: '- (Required) The PostgreSQL server port.'
            postgres_options.tls: '- (Required) TLS configuration block.'
            postgres_options.username: '- (Required) The PostgreSQL username.'
            private_key: (String, Sensitive) The client private key PEM
            public_key_auth: '(Block List, Max: 1) Public key authentication for SSH (see below for nested schema)'
            ssh_options: '- (Optional) SSH target configuration block.'
            ssh_options.allow_insecure_algos: '- (Optional) Allow insecure SSH algorithms. Default: false.'
            ssh_options.host: '- (Required) The SSH server hostname or IP address.'
            ssh_options.password_auth: '- (Optional) Password authentication for SSH. Conflicts with public_key_auth.'
            ssh_options.port: '- (Required) The SSH server port.'
            ssh_options.public_key_auth: '- (Optional) Public key authentication for SSH. Conflicts with password_auth. No additional properties needed.'
            ssh_options.username: '- (Required) The SSH username.'
            tls: '(Block List, Min: 1, Max: 1) TLS configuration (see below for nested schema)'
            token: (String, Sensitive) The bearer token for Kubernetes authentication
            token_auth: '(Block List, Max: 1) Token authentication for Kubernetes (see below for nested schema)'
            url: (String) The HTTP server URL
            username: (String) The MySQL username
            verify: '- (Required) Verify TLS certificates.'
        importStatements: []
    warpgate_target_group:
        subCategory: ""
        description: Manages a target group in Warpgate. Target groups help organize targets visually and logically.
        name: warpgate_target_group
        title: warpgate_target_group Resource - terraform-provider-warpgate
        examples:
            - name: production
              manifest: |-
                {
                  "color": "Danger",
                  "description": "Production environment servers",
                  "name": "production"
                }
            - name: development
              manifest: |-
                {
                  "color": "Info",
                  "description": "Development environment servers",
                  "name": "development"
                }
            - name: databases
              manifest: |-
                {
                  "color": "Warning",
                  "description": "Database servers across all environments",
                  "name": "databases"
                }
        argumentDocs:
            color: '- (Optional) The color that the target group should have for visual identification. Valid values: Primary, Secondary, Success, Danger, Warning, Info, Light, Dark.'
            description: '- (Optional) A human-readable description of the target group.'
            id: '- The ID of the target group.'
            name: '- (Required) The name of the target group. Must be unique within the Warpgate instance.'
        importStatements: []
    warpgate_target_role:
