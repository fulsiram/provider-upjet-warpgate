apiVersion: user.warpgate.salami.network/v1alpha1
kind: KeyCredential
metadata:
  annotations:
    meta.upbound.io/example-id: user/v1alpha1/keycredential
  labels:
    testing.upbound.io/example-name: devops_key
  name: devops-key
spec:
  forProvider:
    label: Work Laptop
    publicKey: ssh-rsa 
      email@example.com
    userIdSelector:
      matchLabels:
        testing.upbound.io/example-name: devops

---

apiVersion: user.warpgate.salami.network/v1alpha1
kind: User
metadata:
  annotations:
    meta.upbound.io/example-id: user/v1alpha1/keycredential
  labels:
    testing.upbound.io/example-name: devops
  name: devops
spec:
  forProvider:
    credentialPolicy:
    - ssh:
      - PublicKey
    username: devops
